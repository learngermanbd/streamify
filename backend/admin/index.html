<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportStream Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --primary: #1CCBD4; --primary-dark: #17a8b0; --secondary: #131931;
  --bg: #0a0f1a; --bg-card: #121a27; --bg-elevated: #1a2436;
  --text: #e0e6ed; --text-muted: #8899aa; --text-dim: #5a6b7c;
  --border: #1e2d45; --green: #22c55e; --orange: #f59e0b;
  --red: #ef4444; --purple: #a78bfa; --pink: #ec4899; --blue: #3b82f6;
  --glass: rgba(28,203,212,0.08); --glass-border: rgba(28,203,212,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', -apple-system, sans-serif;
  background: var(--bg); color: var(--text); min-height:100vh;
}
body::before {
  content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%;
  background: radial-gradient(ellipse at 20% 30%, rgba(28,203,212,0.04) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 70%, rgba(167,139,250,0.03) 0%, transparent 50%);
  z-index:-1;
}

/* ===== LOGIN ===== */
#loginScreen {
  display:flex; align-items:center; justify-content:center; min-height:100vh;
}
.login-card {
  background: var(--bg-card); border:1px solid var(--border); border-radius:16px;
  padding:40px; width:100%; max-width:420px; position:relative; overflow:hidden;
}
.login-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--primary),var(--purple));
}
.login-card h1 {
  font-size:28px; font-weight:800; margin-bottom:4px;
  background:linear-gradient(135deg,var(--primary),var(--purple));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.login-card .subtitle { color:var(--text-muted); font-size:13px; margin-bottom:28px; }
.login-card input {
  width:100%; padding:12px 16px; margin-bottom:14px; border-radius:8px;
  background:var(--bg); border:1px solid var(--border); color:var(--text);
  font-size:14px; outline:none; transition:border-color 0.2s;
}
.login-card input:focus { border-color:var(--primary); }
.login-card button {
  width:100%; padding:12px; border-radius:8px; border:none;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#000; font-size:15px; font-weight:700; cursor:pointer;
  transition:opacity 0.2s;
}
.login-card button:hover { opacity:0.9; }
.login-card .error { color:var(--red); font-size:13px; margin-top:8px; text-align:center; }

/* ===== LAYOUT ===== */
#appScreen { display:none; }
.sidebar {
  position:fixed; left:0; top:0; bottom:0; width:260px;
  background:var(--bg-card); border-right:1px solid var(--border);
  display:flex; flex-direction:column; z-index:100;
}
.sidebar-brand {
  padding:20px 24px; border-bottom:1px solid var(--border);
  font-size:20px; font-weight:800;
  background:linear-gradient(135deg,var(--primary),var(--purple));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.sidebar-nav { flex:1; overflow-y:auto; padding:12px 0; }
.sidebar-nav a {
  display:flex; align-items:center; gap:12px; padding:10px 24px;
  color:var(--text-muted); text-decoration:none; font-size:13px;
  transition:all 0.15s; border-left:3px solid transparent;
}
.sidebar-nav a:hover, .sidebar-nav a.active {
  color:var(--primary); background:var(--glass); border-left-color:var(--primary);
}
.sidebar-nav a .icon { font-size:16px; width:20px; text-align:center; }
.sidebar-footer {
  padding:16px 24px; border-top:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.sidebar-footer .avatar {
  width:32px; height:32px; border-radius:8px; background:var(--primary);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:#000;
}
.sidebar-footer .info { font-size:12px; }
.sidebar-footer .name { color:var(--text); font-weight:600; }
.sidebar-footer .role { color:var(--text-muted); font-size:11px; }

.main-content {
  margin-left:260px; padding:24px 32px; min-height:100vh;
}
.page-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:24px; flex-wrap:wrap; gap:12px;
}
.page-header h2 { font-size:22px; font-weight:700; }
.page-header .actions { display:flex; gap:8px; }

/* ===== COMPONENTS ===== */
.btn {
  padding:8px 16px; border-radius:8px; border:1px solid var(--border);
  background:var(--bg-card); color:var(--text); font-size:13px;
  cursor:pointer; transition:all 0.15s; font-weight:600;
}
.btn:hover { border-color:var(--primary); background:var(--glass); }
.btn.primary { background:var(--primary); color:#000; border-color:var(--primary); }
.btn.primary:hover { background:var(--primary-dark); }
.btn.danger { border-color:var(--red); color:var(--red); }
.btn.danger:hover { background:rgba(239,68,68,0.1); }
.btn.small { padding:4px 10px; font-size:11px; }
.btn:disabled { opacity:0.4; cursor:not-allowed; }

.card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
  padding:24px; margin-bottom:20px; position:relative; overflow:hidden;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--glass-border),transparent);
}
.card h3 { font-size:16px; margin-bottom:16px; color:var(--text); }

.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; }
.stat-card {
  background:var(--bg-elevated); border:1px solid var(--border); border-radius:10px;
  padding:20px; text-align:center;
}
.stat-card .num { font-size:32px; font-weight:800; color:var(--primary); }
.stat-card .label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }

table { width:100%; border-collapse:collapse; font-size:13px; }
.table-wrap { overflow-x:auto; }
th { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
td { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.03); color:var(--text-muted); }
tr:hover td { background:rgba(255,255,255,0.02); }

.badge {
  display:inline-block; padding:2px 8px; border-radius:4px;
  font-size:10px; font-weight:700; text-transform:uppercase;
}
.badge.live { background:rgba(239,68,68,0.15); color:var(--red); }
.badge.scheduled { background:rgba(34,197,94,0.15); color:var(--green); }
.badge.ended { background:rgba(90,107,124,0.15); color:var(--text-dim); }
.badge.draft { background:rgba(245,158,11,0.15); color:var(--orange); }
.badge.active { background:rgba(34,197,94,0.15); color:var(--green); }

/* ===== MODAL ===== */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
  z-index:200; align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--bg-card); border:1px solid var(--border); border-radius:16px;
  padding:32px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto;
}
.modal h3 { font-size:18px; margin-bottom:20px; }
.modal label {
  display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px;
  text-transform:uppercase; letter-spacing:0.5px;
}
.modal input, .modal select, .modal textarea {
  width:100%; padding:10px 14px; margin-bottom:14px; border-radius:8px;
  background:var(--bg); border:1px solid var(--border); color:var(--text);
  font-size:14px; outline:none; font-family:inherit;
}
.modal input:focus, .modal select:focus, .modal textarea:focus {
  border-color:var(--primary);
}
.modal textarea { min-height:80px; resize:vertical; }
.modal .btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }

/* ===== FORM ROW ===== */
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media (max-width:600px) { .form-row { grid-template-columns:1fr; } }

/* ===== TOAST ===== */
.toast {
  position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:8px;
  background:var(--bg-card); border:1px solid var(--border); z-index:300;
  font-size:13px; animation:slideUp 0.3s ease;
}
.toast.success { border-color:var(--green); color:var(--green); }
.toast.error { border-color:var(--red); color:var(--red); }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ===== EMPTY STATE ===== */
.empty-state { text-align:center; padding:40px; color:var(--text-dim); }
.empty-state .icon { font-size:40px; margin-bottom:12px; }
.empty-state p { font-size:14px; }

/* ===== FILTER BAR ===== */
.filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.filter-bar input, .filter-bar select {
  padding:8px 12px; border-radius:6px; background:var(--bg); border:1px solid var(--border);
  color:var(--text); font-size:13px; outline:none;
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px) {
  .sidebar { width:200px; }
  .main-content { margin-left:200px; padding:16px; }
  .stats-grid { grid-template-columns:repeat(2,1fr); }
  table { font-size:11px; }
  th, td { padding:6px 8px; }
}

/* ===== CHART CONTAINER ===== */
.chart-wrap { position:relative; height:300px; margin:16px 0; }
.chart-wrap canvas { width:100% !important; height:100% !important; }

/* ===== PAGE ===== */
.page { display:none; }
.page.active { display:block; }
</style>
</head>
<body>

<!-- ========== LOGIN SCREEN ========== -->
<div id="loginScreen">
  <div class="login-card">
    <h1>SportStream</h1>
    <p class="subtitle">Admin Panel — Phase 8</p>
    <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
    <button onclick="doLogin()">Sign In</button>
    <p class="error" id="loginError"></p>
  </div>
</div>

<!-- ========== APP SCREEN ========== -->
<div id="appScreen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">SportStream Admin</div>
    <nav class="sidebar-nav">
      <a href="#dashboard" class="active" data-page="dashboard">
        <span class="icon">📊</span> Dashboard
      </a>
      <a href="#events" data-page="events">
        <span class="icon">⚽</span> Events
      </a>
      <a href="#channels" data-page="channels">
        <span class="icon">📺</span> Channels
      </a>
      <a href="#highlights" data-page="highlights">
        <span class="icon">🎬</span> Highlights
      </a>
      <a href="#categories" data-page="categories">
        <span class="icon">📂</span> Categories
      </a>
      <a href="#banners" data-page="banners">
        <span class="icon">🖼️</span> Banners
      </a>
      <a href="#notifications" data-page="notifications">
        <span class="icon">🔔</span> Notifications
      </a>
      <a href="#config" data-page="config">
        <span class="icon">⚙️</span> Config
      </a>
      <a href="#users" data-page="users">
        <span class="icon">👤</span> Admin Users
      </a>
      <a href="#analytics" data-page="analytics">
        <span class="icon">📈</span> Analytics
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar" id="sidebarAvatar">A</div>
      <div class="info">
        <div class="name" id="sidebarName">Admin</div>
        <div class="role" id="sidebarRole">EDITOR</div>
      </div>
      <button class="btn small" style="margin-left:auto" onclick="doLogout()">Logout</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content" id="mainContent">
    <!-- Pages injected here by router -->
  </main>
</div>

<!-- ========== MODAL OVERLAY ========== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ==================== STATE ====================
const API = 'http://localhost:3000/api';
let token = localStorage.getItem('streamify_admin_token') || '';
let user = null;
let currentPage = 'dashboard';

// ==================== API HELPERS ====================
let _charts = [];
async function api(path, opts = {}) {
  const headers = { ...opts.headers };
  if (opts.method && opts.method !== 'GET') headers['Content-Type'] = 'application/json';
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(`${API}${path}`, { ...opts, headers });
  if (res.status === 401) { token = ''; localStorage.removeItem('streamify_admin_token'); showLogin(); throw new Error('Unauthorized'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ==================== AUTH ====================
async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const data = await api('/admin/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });
    token = data.accessToken || data.token;
    user = data.user || { email, role: data.role || 'EDITOR', name: email.split('@')[0] };
    localStorage.setItem('streamify_admin_token', token);
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
  }
}

function doLogout() {
  token = ''; user = null;
  localStorage.removeItem('streamify_admin_token');
  showLogin();
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('sidebarAvatar').textContent = (user?.name || 'A')[0].toUpperCase();
  document.getElementById('sidebarName').textContent = user?.name || 'Admin';
  document.getElementById('sidebarRole').textContent = user?.role || 'EDITOR';
  // Hide SUPER_ADMIN pages for non-super
  document.querySelectorAll('[data-page="users"]').forEach(a => {
    a.style.display = user?.role === 'SUPER_ADMIN' ? '' : 'none';
  });
  navigateTo(currentPage);
}

// Auto-restore session
if (token) {
  api('/admin/auth/me').then(d => {
    user = d.user;
    showApp();
  }).catch(() => {
    token = '';
    localStorage.removeItem('streamify_admin_token');
  });
}

// ==================== ROUTER ====================
function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  const link = document.querySelector(`[data-page="${page}"]`);
  if (link) link.classList.add('active');

  const container = document.getElementById('mainContent');
  switch (page) {
    case 'dashboard': renderDashboard(container); break;
    case 'events': renderEvents(container); break;
    case 'channels': renderChannels(container); break;
    case 'highlights': renderHighlights(container); break;
    case 'categories': renderCategories(container); break;
    case 'banners': renderBanners(container); break;
    case 'notifications': renderNotifications(container); break;
    case 'config': renderConfig(container); break;
    case 'users': renderUsers(container); break;
    case 'analytics': renderAnalytics(container); break;
    default: renderDashboard(container);
  }
}

document.querySelectorAll('.sidebar-nav a').forEach(a => {
  a.addEventListener('click', e => { e.preventDefault(); navigateTo(a.dataset.page); });
});

// ==================== TOAST ====================
function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ==================== MODAL ====================
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ==================== PAGES ====================

// -- DASHBOARD --
async function renderDashboard(container) {
  _charts.forEach(c => { try { c.destroy(); } catch (e) {} }); _charts = [];
  container.innerHTML = `<div class="page active">
    <div class="page-header"><h2>Dashboard</h2></div>
    <div class="stats-grid" id="dashStats"></div>
    <div class="card" style="margin-top:20px"><h3>Quick Overview</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px">
        <div class="chart-wrap"><canvas id="chartStatus"></canvas></div>
        <div class="chart-wrap"><canvas id="chartCategories"></canvas></div>
      </div>
    </div>
  </div>`;

  try {
    const [overview, eventsRes, cats] = await Promise.all([
      api('/analytics/overview'),
      api('/events?limit=100'),
      api('/categories?includeHidden=true')
    ]);

    const o = overview.overview;
    document.getElementById('dashStats').innerHTML = `
      <div class="stat-card"><div class="num">${o.totalEvents}</div><div class="label">Total Events</div></div>
      <div class="stat-card"><div class="num">${o.liveEvents}</div><div class="label">Live Now</div></div>
      <div class="stat-card"><div class="num">${o.totalChannels}</div><div class="label">Channels</div></div>
      <div class="stat-card"><div class="num">${o.totalHighlights}</div><div class="label">Highlights</div></div>
      <div class="stat-card"><div class="num">${o.totalUsers}</div><div class="label">Admins</div></div>
    `;

    // Status pie chart
    const statusCounts = { LIVE: 0, SCHEDULED: 0, ENDED: 0, DRAFT: 0 };
    (events.events || []).forEach(e => { if (statusCounts[e.status] !== undefined) statusCounts[e.status]++; });
    _charts.push(new Chart(document.getElementById('chartStatus'), {
      type: 'doughnut',
      data: {
        labels: ['Live', 'Scheduled', 'Ended', 'Draft'],
        datasets: [{ data: [statusCounts.LIVE, statusCounts.SCHEDULED, statusCounts.ENDED, statusCounts.DRAFT],
          backgroundColor: ['#ef4444', '#22c55e', '#5a6b7c', '#f59e0b'], borderWidth: 0 }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins: { legend: { position:'bottom', labels: { color:'#8899aa', padding:16, font:{size:12} } } } }
    });

    // Categories bar chart
    const catNames = (cats.categories || []).map(c => c.name);
    const catCounts = (cats.categories || []).map(c => c._count?.channels || 0);
    _charts.push(new Chart(document.getElementById('chartCategories'), {
      type: 'bar',
      data: {
        labels: catNames,
        datasets: [{ label: 'Channels', data: catCounts, backgroundColor: '#1CCBD4', borderRadius: 6 }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins: { legend: { display:false } },
        scales: { y: { beginAtZero:true, ticks:{color:'#8899aa'}, grid:{color:'rgba(255,255,255,0.04)'} },
          x: { ticks:{color:'#8899aa',font:{size:11}}, grid:{display:false} } } }
    });
  } catch (e) {
    document.getElementById('dashStats').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Could not load stats: ${e.message}</p><p style="font-size:12px;color:var(--text-dim);margin-top:8px">Is the backend running on :3000?</p></div>`;
  }
}

// -- EVENTS --
async function renderEvents(container) {
  container.innerHTML = `<div class="page active">
    <div class="page-header">
      <h2>Events</h2>
      <div class="actions">
        <button class="btn primary" onclick="showEventModal()">+ New Event</button>
      </div>
    </div>
    <div class="filter-bar">
      <select id="eventStatusFilter" onchange="renderEvents(document.getElementById('mainContent'))">
        <option value="">All Status</option>
        <option value="LIVE">Live</option>
        <option value="SCHEDULED">Scheduled</option>
        <option value="ENDED">Ended</option>
        <option value="DRAFT">Draft</option>
      </select>
    </div>
    <div class="card"><div id="eventsTable">Loading...</div></div>
  </div>`;

  try {
    const status = document.getElementById('eventStatusFilter')?.value || '';
    const data = await api(`/events?limit=50${status ? '&status=' + status : ''}`);
    const events = data.events || [];
    if (events.length === 0) {
      document.getElementById('eventsTable').innerHTML = `<div class="empty-state"><div class="icon">⚽</div><p>No events yet</p></div>`;
      return;
    }
    document.getElementById('eventsTable').innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr><th>Title</th><th>Category</th><th>Status</th><th>Teams</th><th>Streams</th><th>Actions</th></tr></thead>
        <tbody>${eventsRes.events.map(e => `
          <tr>
            <td style="color:var(--text)">${esc(e.title)}</td>
            <td>${esc(e.category?.name || '—')}</td>
            <td><span class="badge ${e.status?.toLowerCase()}">${e.status}</span></td>
            <td>${esc(e.teamAName)} vs ${esc(e.teamBName)}</td>
            <td>${(e.streams || []).length}</td>
            <td>
              <button class="btn small" onclick="showEventModal('${e.id}')">Edit</button>
              <button class="btn small danger" onclick="deleteEvent('${e.id}')">Delete</button>
            </td>
          </tr>`).join('')}</tbody>
      </table>`;
  } catch (e) {
    document.getElementById('eventsTable').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

async function showEventModal(id) {
  let event = null;
  if (id) {
    try { const d = await api(`/events/${id}`); event = d.event; } catch (e) {}
  }

  // Get categories for dropdown
  let catOpts = '';
  try {
    const cats = await api('/categories?includeHidden=true');
    (cats.categories || []).forEach(c => {
      catOpts += `<option value="${c.id}" ${event?.categoryId === c.id ? 'selected' : ''}>${esc(c.name)}</option>`;
    });
  } catch (e) {}

  openModal(`
    <h3>${id ? 'Edit Event' : 'New Event'}</h3>
    <div class="form-row">
      <div><label>Title</label><input id="evTitle" value="${esc(event?.title || '')}"></div>
      <div><label>Category</label><select id="evCategory">${catOpts}</select></div>
    </div>
    <div class="form-row">

  try {
    const data = await api('/admin/users');
    const users = data.users || [];
    document.getElementById('usersTable').innerHTML = `
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Last Login</th><th>Actions</th></tr></thead>
        <tbody>${users.map(u => `
          <tr>
            <td style="color:var(--text)">${esc(u.name)}</td>
            <td>${esc(u.email)}</td>
            <td><span class="badge ${u.role === 'SUPER_ADMIN' ? 'active' : ''}">${u.role}</span></td>
            <td>${u.lastLoginAt ? new Date(u.lastLoginAt).toLocaleString() : 'Never'}</td>
            <td>
              <button class="btn small" onclick="showUserModal('${u.id}')">Edit</button>
              ${u.id !== user?.id ? `<button class="btn small danger" onclick="deleteUser('${u.id}')">Delete</button>` : ''}
            </td>
          </tr>`).join('')}</tbody>
      </table>`;
  } catch (e) {
    document.getElementById('usersTable').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

async function showUserModal(id) {
  let u = null;
  if (id) { try { const d = await api('/admin/users'); u = (d.users || []).find(x => x.id === id); } catch (e) {} }
  openModal(`
    <h3>${id ? 'Edit Admin' : 'New Admin'}</h3>
    <label>Name</label><input id="auName" value="${esc(u?.name || '')}">
    <label>Email</label><input id="auEmail" value="${esc(u?.email || '')}" ${id ? 'readonly' : ''}>
    <label>Password</label><input id="auPassword" type="password" placeholder="${id ? 'Leave blank to keep current' : 'Required'}">
    <label>Role</label><select id="auRole">
      <option value="EDITOR" ${u?.role === 'EDITOR' ? 'selected' : ''}>Editor</option>
      <option value="VIEWER" ${u?.role === 'VIEWER' ? 'selected' : ''}>Viewer</option>
      <option value="SUPER_ADMIN" ${u?.role === 'SUPER_ADMIN' ? 'selected' : ''}>Super Admin</option>
    </select>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveUser('${id || ''}')">${id ? 'Update' : 'Create'}</button>
    </div>
  `);
}

async function saveUser(id) {
  const body = { name: document.getElementById('auName').value, role: document.getElementById('auRole').value };
  if (!id) { body.email = document.getElementById('auEmail').value; body.password = document.getElementById('auPassword').value; }
  else if (document.getElementById('auPassword').value) { body.password = document.getElementById('auPassword').value; }
  try {
    if (id) { await api(`/admin/users/${id}`, { method: 'PUT', body: JSON.stringify(body) }); }
    else { await api('/admin/users', { method: 'POST', body: JSON.stringify(body) }); }
    closeModal(); toast(id ? 'User updated' : 'User created');
    renderUsers(document.getElementById('mainContent'));
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteUser(id) {
  if (!confirm('Delete this admin user?')) return;
  try { await api(`/admin/users/${id}`, { method: 'DELETE' }); toast('User deleted'); renderUsers(document.getElementById('mainContent')); }
  catch (e) { toast(e.message, 'error'); }
}

// -- ANALYTICS --
async function renderAnalytics(container) {
  container.innerHTML = `<div class="page active">
    <div class="page-header"><h2>Analytics</h2></div>
    <div class="stats-grid" id="analStats"></div>
    <div class="card" style="margin-top:20px">
      <h3>Event Types</h3>
      <div class="chart-wrap"><canvas id="chartAnalytics"></canvas></div>
    </div>
  </div>`;

  try {
    const [overview, events] = await Promise.all([
      api('/analytics/overview'),
      api('/analytics/events?limit=200')
    ]);

    const o = overview.overview;
    document.getElementById('analStats').innerHTML = `
      <div class="stat-card"><div class="num">${o.totalAnalyticsEvents}</div><div class="label">Total Events</div></div>
      <div class="stat-card"><div class="num">${o.totalEvents}</div><div class="label">Content Events</div></div>
      <div class="stat-card"><div class="num">${o.liveEvents}</div><div class="label">Live Now</div></div>
      <div class="stat-card"><div class="num">${o.totalHighlights}</div><div class="label">Highlights</div></div>
    `;

    // Group by eventType
    const groups = {};
    (events.events || []).forEach(e => {
      groups[e.eventType] = (groups[e.eventType] || 0) + 1;
    });
    const labels = Object.keys(groups);
    const values = Object.values(groups);

    _charts.push(new Chart(document.getElementById('chartAnalytics'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{ label: 'Count', data: values, backgroundColor: labels.map((_, i) => ['#1CCBD4','#a78bfa','#22c55e','#f59e0b','#ef4444','#ec4899'][i % 6]), borderRadius: 6 }]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: { legend: { display:false } },
        scales: { y: { beginAtZero:true, ticks:{color:'#8899aa'}, grid:{color:'rgba(255,255,255,0.04)'} }, x: { ticks:{color:'#8899aa',font:{size:11}}, grid:{display:false} } }
      }
    });
  } catch (e) {
    document.getElementById('analStats').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

// ==================== UTILS ====================
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDuration(s) {
  const mins = Math.floor(s / 60);
  const secs = s % 60;
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function formatNumber(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toString();
}
